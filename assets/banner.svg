<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="focus-cam-log — privacy-first webcam focus journaling">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#101a33"/>
      <stop offset="1" stop-color="#0b2530"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.42" cy="0.38" r="0.85">
      <stop offset="0" stop-color="#7fd8c8"/>
      <stop offset="0.35" stop-color="#2e7f8f"/>
      <stop offset="0.75" stop-color="#173a55"/>
      <stop offset="1" stop-color="#0d1c2e"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.035">
    <path d="M0 80h1280M0 160h1280M0 240h1280"/>
    <path d="M160 0v320M320 0v320M480 0v320M640 0v320M800 0v320M960 0v320M1120 0v320"/>
  </g>

  <!-- camera lens motif -->
  <g transform="translate(214,160)">
    <circle r="118" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="2"/>
    <circle r="96" fill="none" stroke="#5eead4" stroke-opacity="0.35" stroke-width="2"/>
    <circle r="74" fill="url(#lens)" stroke="#7dd3fc" stroke-opacity="0.5" stroke-width="2"/>
    <circle r="30" fill="#0b1220" stroke="#5eead4" stroke-opacity="0.8" stroke-width="2"/>
    <circle r="12" fill="#5eead4" fill-opacity="0.9"/>
    <circle cx="-22" cy="-26" r="9" fill="#e0fdf7" fill-opacity="0.55"/>
    <!-- focus brackets -->
    <g stroke="url(#accent)" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M-138 -96 h-22 M-138 -96 v-22" transform="translate(-4,-4)"/>
      <path d="M138 -96 h22 M138 -96 v-22" transform="translate(4,-4)"/>
      <path d="M-138 96 h-22 M-138 96 v22" transform="translate(-4,4)"/>
      <path d="M138 96 h22 M138 96 v22" transform="translate(4,4)"/>
    </g>
  </g>

  <!-- activity timeline dots -->
  <g transform="translate(438,238)">
    <path d="M0 0 H600" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <g fill="#5eead4">
      <circle cx="20" r="7"/><circle cx="90" r="7"/><circle cx="160" r="7"/>
      <circle cx="300" r="7"/><circle cx="370" r="7"/><circle cx="440" r="7"/><circle cx="510" r="7"/>
    </g>
    <circle cx="230" r="7" fill="#fbbf24"/>
    <circle cx="580" r="7" fill="#fbbf24"/>
    <text x="230" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#fbbf24" fill-opacity="0.85" text-anchor="middle">focus drift</text>
  </g>

  <!-- title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="438" y="128" font-size="64" font-weight="700" fill="#f1f5f9" letter-spacing="1">focus-cam-log</text>
    <text x="438" y="176" font-size="24" fill="#94a3b8">privacy-first webcam focus journaling</text>
    <g font-size="16" fill="#5eead4">
      <text x="438" y="300">local SQLite</text>
      <text x="586" y="300">photos opt-in</text>
      <text x="752" y="300">auto retention</text>
      <text x="922" y="300">powered by Gemini</text>
    </g>
    <g fill="#334155" font-size="16">
      <text x="566" y="300">·</text>
      <text x="732" y="300">·</text>
      <text x="902" y="300">·</text>
    </g>
  </g>
</svg>
